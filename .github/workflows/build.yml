name: SFOS tissot build

# Runs on a SELF-HOSTED runner only. GitHub-hosted runners (2-core, ~14GB
# disk free) cannot fit an Android + hybris build. Register a self-hosted
# runner on your build host with the label below.
#
# Settings > Actions > Runners > New self-hosted runner, then tag it
# with the label "sfos-hadk" (edit the runner's config.sh --labels flag,
# or add it after registration in the runner settings).

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * 0"   # optional: weekly rebuild, remove if unwanted

env:
  DEVICE: tissot
  VENDOR: xiaomi
  PORT_ARCH: armv7hl
  SFOS_VERSION: "4.6.0.11"
  HABUILD_SDK: ${{ github.workspace }}/habuild-sdk
  ANDROID_ROOT: ${{ github.workspace }}/hadk

jobs:
  sync_source:
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Set up HABUILD SDK link
        run: bash scripts/setup-habuild.sh
      - name: repo init/sync (halium-9.0 + tissot local manifest)
        run: bash scripts/sync-source.sh
      - name: Upload manifest for later jobs
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: hadk/.repo/manifest.xml
          retention-days: 1

  build_hybris_hal:
    needs: sync_source
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Build hybris-boot / hybris-recovery
        run: bash scripts/build-hybris-hal.sh
      - name: Upload boot images
        uses: actions/upload-artifact@v4
        with:
          name: hybris-boot-images
          path: |
            hadk/out/target/product/${{ env.DEVICE }}/hybris-boot.img
            hadk/out/target/product/${{ env.DEVICE }}/hybris-recovery.img
          retention-days: 7

  build_rootfs:
    needs: build_hybris_hal
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Build droid-hal / droid-config RPMs
        run: bash scripts/build-droid-hal.sh
      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: droid-hal-rpms
          path: rpms/*.rpm
          retention-days: 7

  package_image:
    needs: build_rootfs
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Build flashable image with mic
        run: bash scripts/build-image.sh
      - name: Upload final image
        uses: actions/upload-artifact@v4
        with:
          name: sfos-tissot-image
          path: images/*
          retention-days: 14

name: SFOS tissot build

# Runs on a SELF-HOSTED runner only. GitHub-hosted runners cannot fit an
# Android + hybris build (disk/RAM/time). Register a self-hosted runner
# on your build host, tagged "sfos-hadk".
#
# IMPORTANT: Platform SDK, the HABUILD chroot, and the full Android source
# tree live at FIXED PATHS ON THE RUNNER HOST, set up once by hand and
# reused across every run. They are intentionally outside
# ${{ github.workspace }}, which gets wiped/re-checked-out on every job.
# Only this repo's own scripts, and final build outputs, pass through the
# workspace.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * 0"   # optional: weekly rebuild, remove if unwanted

env:
  DEVICE: tissot
  VENDOR: xiaomi
  PORT_ARCH: armv7hl
  SFOS_VERSION: "4.6.0.11"
  # Persistent host paths - NOT under github.workspace. Adjust to match
  # wherever you actually installed these on the runner host.
  PLATFORM_SDK_ROOT: /srv/hadk/sdk
  ANDROID_ROOT: /srv/hadk/hadk

jobs:
  sync_source:
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Verify Platform SDK / HABUILD chroot present
        run: bash scripts/setup-habuild.sh
      - name: repo init/sync (halium-9.0 + tissot local manifest)
        run: bash scripts/sync-source.sh
      - name: Copy manifest into workspace for artifact upload
        run: |
          mkdir -p artifacts
          cp "$ANDROID_ROOT/.repo/manifest.xml" artifacts/manifest.xml
      - uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: artifacts/manifest.xml
          retention-days: 1

  build_hybris_hal:
    needs: sync_source
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Build hybris-boot / hybris-recovery
        run: bash scripts/build-hybris-hal.sh
      - name: Copy images into workspace for artifact upload
        run: |
          mkdir -p artifacts
          cp "$ANDROID_ROOT/out/target/product/$DEVICE/hybris-boot.img" artifacts/
          cp "$ANDROID_ROOT/out/target/product/$DEVICE/hybris-recovery.img" artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: hybris-boot-images
          path: |
            artifacts/hybris-boot.img
            artifacts/hybris-recovery.img
          retention-days: 7

  build_rootfs:
    needs: build_hybris_hal
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Build droid-hal / droid-config RPMs
        run: bash scripts/build-droid-hal.sh
      - uses: actions/upload-artifact@v4
        with:
          name: droid-hal-rpms
          path: artifacts/rpms/*.rpm
          retention-days: 7

  package_image:
    needs: build_rootfs
    runs-on: [self-hosted, sfos-hadk]
    steps:
      - uses: actions/checkout@v4
      - name: Build flashable image with mic
        run: bash scripts/build-image.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sfos-tissot-image
          path: artifacts/images/*
          retention-days: 14

name: Sailfish OS Tissot Build

on:
  workflow_dispatch:
    inputs:
      step_1_download:
        description: 'Step 1: Download & Sync Source Code'
        required: true
        type: boolean
        default: true
      step_2_build:
        description: 'Step 2: Build Android and Droid HAL'
        required: true
        type: boolean
        default: true

env:
  SFOS_RELEASE: "4.5.0.16"
  SFOS_ARCH: "aarch64"
  VENDOR: "xiaomi"
  DEVICE: "tissot"

jobs:
  compile:
    runs-on: self-hosted

    steps:
      # ==========================================
      # CONDITIONAL CLEANUP
      # Only wipe if we are doing a full repo sync
      # ==========================================
      - name: Clean Workspace (Conditional)
        if: ${{ github.event.inputs.step_1_download == 'true' }}
        run: sudo rm -rf .[^.]* *

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false

      # ==========================================
      # STEP 1: DOWNLOAD CODE
      # ==========================================
      - name: Prepare & Sync Source Code
        if: ${{ github.event.inputs.step_1_download == 'true' }}
        run: |
          git config --global user.name "Builder"
          git config --global user.email "builder@localhost"
          git config --global --add safe.directory '*'
          
          if [ ! -d ".repo" ]; then
            repo init -u https://github.com/mer-hybris/android.git -b hybris-16.0
          fi
          
          # Extract Tissot local manifests early
          mkdir -p rpm
          if [ ! -d "rpm/droid-hal-tissot" ]; then
            git clone https://gitlab.com/aj750390/droid-hal-tissot.git rpm/droid-hal-tissot
          fi
          
          mkdir -p .repo/local_manifests
          find rpm/droid-hal-tissot -name "*.xml" -type f -exec cp {} .repo/local_manifests/ \;
          
          # Force sync to get the device tree
          repo sync -c -f -j$(nproc) --force-sync
          
          rm -rf external/libhybris
          git clone https://github.com/mer-hybris/libhybris.git external/libhybris
          cd external/libhybris && git submodule update --init --depth 1 && cd ../..

      # ==========================================
      # STEP 2: BUILD HAL
      # ==========================================
      - name: Build Android & Droid HAL
        if: ${{ github.event.inputs.step_2_build == 'true' }}
        run: |
          mkdir -p rpm
          
          # 1. Ensure absolute dependencies exist EVEN IF Step 1 was skipped
          [ ! -d "rpm/droid-hal-tissot" ] && git clone https://gitlab.com/aj750390/droid-hal-tissot.git rpm/droid-hal-tissot
          [ ! -d "rpm/droid-config-tissot" ] && git clone https://gitlab.com/aj750390/droid-config-tissot.git rpm/droid-config-tissot
          [ ! -d "dhd" ] && git clone https://github.com/mer-hybris/droid-hal-device.git dhd
          
          # Explicitly clone the kernel checker so it never fails on Step 2 runs
          if [ ! -d "hybris/mer-kernel-check" ]; then
            mkdir -p hybris
            git clone https://github.com/mer-hybris/mer-kernel-check.git hybris/mer-kernel-check
          fi
          chmod -R +x hybris/mer-kernel-check/ || true
          
          # 2. Bypass the internal directory check crash
          sed -i '1s|^.*|#!/bin/bash\nexport ANDROID_ROOT=$(pwd)|' dhd/helpers/build_packages.sh
          sed -i '/launch this script/ { N; s/exit 1/echo "Bypassed directory check exit"/ }' dhd/helpers/build_packages.sh
          
          # 3. Satisfy the util.sh relative path requirement
          cp -r dhd rpm/dhd
          cp -r dhd rpm/droid-hal-tissot/rpm/
          cp -r dhd rpm/droid-config-tissot/rpm/
          
          sudo chmod -R 777 rpm dhd
          
          # 4. Generate build script
          cat << 'EOF' > run_build.sh
          #!/bin/bash
          set -e
          
          export ANDROID_ROOT=$(pwd)
          git config --global --add safe.directory '*'
          
          TARGET_NAME=${VENDOR}-${DEVICE}-${PORT_ARCH}
          if ! sdk-assistant list | grep -q "$TARGET_NAME"; then
            sdk-assistant -y create $TARGET_NAME https://releases.sailfishos.org/sdk/targets/Sailfish_OS-${SFOS_RELEASE}-Sailfish_SDK_Target-${PORT_ARCH}.tar.7z
          fi
          
          ./dhd/helpers/build_packages.sh -b rpm/droid-hal-tissot
          ./dhd/helpers/build_packages.sh -b rpm/droid-config-tissot
          EOF
          
          chmod +x run_build.sh
          
          # Execute inside Sailfish OS chroot
          docker run --rm --privileged -v $GITHUB_WORKSPACE:/home/mersdk/share -w /home/mersdk/share \
            -e SFOS_RELEASE=$SFOS_RELEASE \
            -e VENDOR=$VENDOR \
            -e DEVICE=$DEVICE \
            -e PORT_ARCH=$SFOS_ARCH \
            coderus/sailfishos-platform-sdk:$SFOS_RELEASE /home/mersdk/share/run_build.sh

      # ==========================================
      # STEP 3: ARTIFACT UPLOAD
      # ==========================================
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfos-tissot-build-files
          path: |
            rpm/droid-hal-tissot/rpm/*.rpm
            rpm/droid-config-tissot/rpm/*.rpm
          retention-days: 90

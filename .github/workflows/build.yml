name: Sailfish OS Tissot Build

on:
  workflow_dispatch:
    inputs:
      step_1_download:
        description: 'Step 1: Download & Sync Source Code'
        required: true
        type: boolean
        default: true
      step_2_build:
        description: 'Step 2: Build Android and Droid HAL'
        required: true
        type: boolean
        default: true

env:
  SFOS_RELEASE: "4.5.0.16"
  SFOS_ARCH: "aarch64"
  VENDOR: "xiaomi"
  DEVICE: "tissot"

jobs:
  compile:
    runs-on: self-hosted

    steps:
      - name: Clean Workspace
        run: sudo rm -rf .[^.]* *

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false

      # ==========================================
      # STEP 1: DOWNLOAD CODE
      # ==========================================
      - name: Prepare & Sync Source Code
        if: ${{ github.event.inputs.step_1_download == 'true' }}
        run: |
          git config --global user.name "Builder"
          git config --global user.email "builder@localhost"
          git config --global --add safe.directory '*'
          
          if [ ! -d ".repo" ]; then
            repo init -u https://github.com/mer-hybris/android.git -b hybris-16.0
          fi
          repo sync -f -j$(nproc)
          
          rm -rf external/libhybris
          git clone https://github.com/mer-hybris/libhybris.git external/libhybris
          cd external/libhybris && git submodule update --init --depth 1 && cd ../..

      # ==========================================
      # STEP 2: BUILD HAL
      # ==========================================
      - name: Build Android & Droid HAL
        if: ${{ github.event.inputs.step_2_build == 'true' }}
        run: |
          # Create standard RPM layout
          mkdir -p rpm/dhd
          git clone https://gitlab.com/aj750390/droid-hal-tissot.git rpm/droid-hal-tissot
          git clone https://gitlab.com/aj750390/droid-config-tissot.git rpm/droid-config-tissot
          git clone https://github.com/mer-hybris/droid-hal-device.git rpm/dhd
          
          # Restore symbolic link for script path integrity
          sudo rm -f dhd
          sudo ln -s $GITHUB_WORKSPACE/rpm/dhd $GITHUB_WORKSPACE/dhd
          
          # Fix permissions for the container user
          sudo chmod -R 777 rpm
          
          # Run build in Docker
          docker run --rm --privileged -v $GITHUB_WORKSPACE:/home/mersdk/share -w /home/mersdk/share \
            -e SFOS_RELEASE=$SFOS_RELEASE \
            -e VENDOR=$VENDOR \
            -e DEVICE=$DEVICE \
            -e PORT_ARCH=$SFOS_ARCH \
            -e ANDROID_ROOT=/home/mersdk/share \
            coderus/sailfishos-platform-sdk:$SFOS_RELEASE /bin/bash -c "
              set -e
              git config --global --add safe.directory '*'
              
              # Initialize target in SDK
              TARGET_NAME=\${VENDOR}-\${DEVICE}-\${PORT_ARCH}
              if ! sdk-assistant list | grep -q \"\$TARGET_NAME\"; then
                sdk-assistant -y create \$TARGET_NAME https://releases.sailfishos.org/sdk/targets/Sailfish_OS-\${SFOS_RELEASE}-Sailfish_SDK_Target-\${PORT_ARCH}.tar.7z
              fi
              
              # Execute build scripts from their expected location
              /home/mersdk/share/dhd/helpers/build_packages.sh -b rpm/droid-hal-tissot
              /home/mersdk/share/dhd/helpers/build_packages.sh -b rpm/droid-config-tissot
            "

      # ==========================================
      # STEP 3: ARTIFACT UPLOAD
      # ==========================================
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfos-tissot-build-files
          path: |
            rpm/droid-hal-tissot/rpm/*.rpm
            rpm/droid-config-tissot/rpm/*.rpm
          retention-days: 90
